# mimotech.cn Nginx 配置
# 使用方法：
# 1. 先将 mimotech.cn 的 DNS 指向本机 IP（8.218.230.140）
# 2. 申请 SSL 证书：sudo certbot --nginx -d mimotech.cn -d www.mimotech.cn
# 3. 复制配置：sudo cp /path/to/mimotech-nginx.conf /etc/nginx/conf.d/mimotech.conf
# 4. 重载 nginx：sudo nginx -s reload

# 网站文件目录：/var/www/mimotech.cn/public/

# HTTP -> HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name mimotech.cn www.mimotech.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/mimotech.cn/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mimotech.cn www.mimotech.cn;

    ssl_certificate /etc/letsencrypt/live/mimotech.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mimotech.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/mimotech.cn/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
