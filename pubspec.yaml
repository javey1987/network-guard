name: network_guard
description: 定时断网助手 - 到点自动关闭 WiFi 和移动网络
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  timezone: ^0.9.2
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
