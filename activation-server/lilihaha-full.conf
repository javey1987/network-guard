# 默认站点（IP 直接访问时展示写真馆）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/lilihaha.com/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# lilihaha.com
server {
    server_name lilihaha.com www.lilihaha.com;

    root /var/www/lilihaha.com/public;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/lilihaha.com/public;
    }

    # 网络助手激活 API → Node.js 服务 :3002
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    client_max_body_size 50M;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lilihaha.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lilihaha.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.lilihaha.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = lilihaha.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name lilihaha.com www.lilihaha.com;
    return 404; # managed by Certbot
}
