name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'website/**'
      - 'README.md'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ Build APK
        run: flutter build apk --${{ inputs.build_mode || 'release' }} --split-per-abi 2>&1

      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: network-guard-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
