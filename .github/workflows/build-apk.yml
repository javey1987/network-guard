name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'website/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔨 Build APK
        run: flutter build apk --${{ inputs.build_mode || 'debug' }} --split-per-abi

      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: network-guard-apk-${{ inputs.build_mode || 'debug' }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: 📦 Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
