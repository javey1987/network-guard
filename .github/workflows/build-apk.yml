name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'website/**'
      - 'README.md'
      - '.github/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ✅ Analyze
        run: flutter analyze

      - name: 🏗️ Build APK (${{ inputs.build_mode || 'release' }})
        run: flutter build apk --${{ inputs.build_mode || 'release' }} --split-per-abi

      - name: 📤 Upload APKs (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: network-guard-apks-${{ inputs.build_mode || 'release' }}
          path: |
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 📋 List outputs
        run: ls -lh build/app/outputs/flutter-apk/
