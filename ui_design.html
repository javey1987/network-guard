<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络守卫 · UI 设计</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ───────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:#0b0d11;
  color:#e6e8ed;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
  background-image:
    radial-gradient(ellipse at 20% 30%, rgba(255,107,53,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(78,205,196,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.04) 0%, transparent 50%);
}

/* ─── PHONE FRAME ──────────────────────────────── */
.phone{
  width:390px;height:844px;
  background:#111318;
  border-radius:48px;
  padding:16px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 30px 80px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.04) inset;
  position:relative;
  flex-shrink:0;
}
.phone-notch{
  width:150px;height:28px;
  background:#0b0d11;
  border-radius:0 0 18px 18px;
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  z-index:20;
}
.phone-screen{
  width:100%;height:100%;
  background:#13151a;
  border-radius:34px;
  overflow:hidden;
  position:relative;
}
.status-bar{
  padding:14px 24px 6px;
  display:flex;justify-content:space-between;
  font-size:11px;font-weight:500;
  color:rgba(255,255,255,0.5);
  letter-spacing:0.3px;
}

/* ─── SCREENS ──────────────────────────────────── */
.screen{
  padding:0 20px 20px;
  height:calc(100% - 36px);
  overflow-y:auto;
  scrollbar-width:none;
  transition:opacity 0.4s ease, transform 0.4s cubic-bezier(0.16,1,0.3,1);
}
.screen::-webkit-scrollbar{display:none}
.screen-hidden{opacity:0;transform:translateY(12px);pointer-events:none;position:absolute;width:calc(100% - 40px)}
.screen-visible{opacity:1;transform:translateY(0)}

/* ─── STATUS BANNER ────────────────────────────── */
.status-banner{
  background:linear-gradient(135deg,#1a1d26 0%,#1e212a 100%);
  border-radius:20px;
  padding:24px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.04);
  margin-bottom:20px;
}
.status-banner::before{
  content:'';position:absolute;top:-40%;right:-20%;
  width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
}
.status-banner.blocked::before{
  background:radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
}
.status-icon-wrap{
  width:56px;height:56px;
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  font-size:26px;
  background:rgba(78,205,196,0.12);
  border:1px solid rgba(78,205,196,0.15);
}
.status-banner.blocked .status-icon-wrap{
  background:rgba(255,107,53,0.12);
  border-color:rgba(255,107,53,0.2);
}
.status-title{font-size:20px;font-weight:700;margin-bottom:2px}
.status-sub{font-size:13px;color:rgba(255,255,255,0.45);font-weight:400}
.status-banner.blocked .status-title{color:#ff9a6b}
.status-timer{
  display:flex;align-items:center;gap:6px;
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.05);
  font-size:12px;color:rgba(255,255,255,0.35);
}

/* ─── SECTION HEADER ───────────────────────────── */
.section-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.section-title{font-size:15px;font-weight:600;color:rgba(255,255,255,0.7)}
.section-count{font-size:12px;font-weight:500;color:rgba(255,255,255,0.25)}

/* ─── RULE CARD ────────────────────────────────── */
.rule-card{
  background:linear-gradient(135deg,#1a1d27 0%,#171a22 100%);
  border-radius:16px;
  padding:18px;
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,0.04);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.3s, transform 0.2s;
}
.rule-card:hover{border-color:rgba(255,255,255,0.08);transform:translateY(-1px)}
.rule-card.active{
  border-color:rgba(255,107,53,0.3);
  box-shadow:0 0 0 1px rgba(255,107,53,0.1);
}
.rule-card.active::after{
  content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,#ff6b35,#ff9a6b);
  border-radius:0 2px 2px 0;
}
.rule-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rule-name{font-size:15px;font-weight:600}
.rule-card.active .rule-name{color:#ff9a6b}
.rule-toggle{
  width:40px;height:22px;border-radius:11px;
  background:rgba(255,255,255,0.08);
  position:relative;cursor:pointer;transition:background 0.3s;
  flex-shrink:0;
}
.rule-toggle.on{background:rgba(78,205,196,0.5)}
.rule-toggle-knob{
  width:18px;height:18px;border-radius:50%;
  background:#e6e8ed;
  position:absolute;top:2px;left:2px;
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.rule-toggle.on .rule-toggle-knob{transform:translateX(18px);background:#4ecdc4}

.rule-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.rule-time{
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);
}
.rule-time svg{width:14px;height:14px;opacity:0.4}
.rule-badge{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:5px;
  font-size:10px;font-weight:600;letter-spacing:0.3px;
  background:rgba(255,107,53,0.12);color:#ff9a6b;
  border:1px solid rgba(255,107,53,0.15);
}
.rule-tags{display:flex;gap:6px}
.rule-tag{
  padding:2px 8px;border-radius:4px;
  font-size:10px;font-weight:500;
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.35);
  border:1px solid rgba(255,255,255,0.06);
}
.rule-tag.wifi{background:rgba(78,205,196,0.1);color:#4ecdc4;border-color:rgba(78,205,196,0.15)}
.rule-tag.mobile{background:rgba(99,102,241,0.1);color:#818cf8;border-color:rgba(99,102,241,0.15)}
.rule-tag.strict{background:rgba(239,68,68,0.1);color:#f87171;border-color:rgba(239,68,68,0.15)}

/* ─── FLOATING ACTION BUTTON ───────────────────── */
.fab{
  position:absolute;bottom:28px;right:28px;
  width:56px;height:56px;
  border-radius:18px;
  background:linear-gradient(135deg,#4ecdc4,#44b09e);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(78,205,196,0.25);
  transition:transform 0.2s, box-shadow 0.2s;
  z-index:10;
}
.fab:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(78,205,196,0.35)}
.fab svg{width:24px;height:24px;stroke:#0b0d11;stroke-width:2.5}

/* ─── ADD SCHEDULE SCREEN ──────────────────────── */
.form-group{margin-bottom:20px}
.form-label{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:8px;
  display:block;
}
.form-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  color:#e6e8ed;
  font-family:'Space Grotesk';font-size:15px;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:rgba(78,205,196,0.3)}
.form-input::placeholder{color:rgba(255,255,255,0.15)}
.time-pickers{display:flex;gap:12px}
.time-picker{
  flex:1;padding:16px;text-align:center;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;cursor:pointer;
  transition:border-color 0.2s, background 0.2s;
}
.time-picker:hover{border-color:rgba(78,205,196,0.2);background:rgba(78,205,196,0.03)}
.time-picker-label{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px}
.time-picker-value{font-size:24px;font-weight:700;letter-spacing:1px}
.time-picker-desc{font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px}
.time-arrow{display:flex;align-items:center;padding:0 4px;color:rgba(255,255,255,0.15)}

.week-chips{display:flex;gap:6px}
.week-chip{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:500;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;transition:all 0.2s;
  color:rgba(255,255,255,0.3);
}
.week-chip.active{background:rgba(78,205,196,0.12);border-color:rgba(78,205,196,0.25);color:#4ecdc4}
.week-chip:hover{border-color:rgba(255,255,255,0.12)}

.network-option{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:border-color 0.2s;
}
.network-option:last-child{margin-bottom:0}
.network-option:hover{border-color:rgba(255,255,255,0.1)}
.network-option-left{display:flex;align-items:center;gap:12px}
.network-option-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.network-option-icon.wifi{background:rgba(78,205,196,0.12)}
.network-option-icon.mobile{background:rgba(99,102,241,0.12)}
.network-option-title{font-size:14px;font-weight:500}
.network-option-desc{font-size:11px;color:rgba(255,255,255,0.3);margin-top:1px}

/* ─── TOGGLE SWITCH (for network options) ──────── */
.switch{
  width:40px;height:22px;border-radius:11px;
  background:rgba(255,255,255,0.08);
  position:relative;cursor:pointer;transition:background 0.3s;flex-shrink:0;
}
.switch.on{background:rgba(78,205,196,0.5)}
.switch-knob{
  width:18px;height:18px;border-radius:50%;
  background:#e6e8ed;
  position:absolute;top:2px;left:2px;
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.switch.on .switch-knob{transform:translateX(18px);background:#4ecdc4}

/* ─── BUTTON ───────────────────────────────────── */
.btn-primary{
  width:100%;padding:16px;
  border:none;border-radius:14px;
  background:linear-gradient(135deg,#4ecdc4,#44b09e);
  color:#0b0d11;
  font-family:'Space Grotesk';font-size:15px;font-weight:600;
  cursor:pointer;
  transition:transform 0.2s, box-shadow 0.2s;
  margin-top:8px;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(78,205,196,0.2)}
.btn-secondary{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.5);font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
  font-family:'Space Grotesk';
}
.btn-secondary:hover{border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}

/* ─── NAVIGATION ───────────────────────────────── */
.nav-bar{
  display:flex;align-items:center;
  padding:8px 0 4px;
  gap:10px;
}
.nav-back{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px 6px 6px;border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.5);font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
  font-family:'Space Grotesk';
}
.nav-back:hover{border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
.nav-title{font-size:15px;font-weight:600;color:rgba(255,255,255,0.8)}

/* ─── EMPTY STATE ──────────────────────────────── */
.empty-state{
  text-align:center;padding:50px 20px;
}
.empty-icon{
  width:80px;height:80px;margin:0 auto 16px;
  background:rgba(255,255,255,0.03);
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;border:1px solid rgba(255,255,255,0.05);
}
.empty-title{font-size:16px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:6px}
.empty-desc{font-size:13px;color:rgba(255,255,255,0.2)}

/* ─── STRICT MODE ──────────────────────────────── */
.strict-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;
}
.strict-left{flex:1}
.strict-title{font-size:14px;font-weight:500}
.strict-desc{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}

/* ─── ANIMATIONS ───────────────────────────────── */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.anim-in{animation:fadeSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
.delay-1{animation-delay:0.05s}
.delay-2{animation-delay:0.1s}
.delay-3{animation-delay:0.15s}
.delay-4{animation-delay:0.2s}
.delay-5{animation-delay:0.25s}
.delay-6{animation-delay:0.3s}
.delay-7{animation-delay:0.35s}

/* ─── RESPONSIVE ────────────────────────────────── */
@media(max-width:480px){
  body{padding:0;align-items:stretch}
  .phone{width:100%;height:100vh;border-radius:0;padding:0;box-shadow:none}
  .phone-notch{display:none}
  .phone-screen{border-radius:0}
  .status-bar{padding:12px 20px 4px}
}
</style>
</head>
<body>

<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span>📶 🔋 91%</span>
    </div>

    <!-- ═══ SCREEN 1: HOME ═══ -->
    <div id="screen-home" class="screen screen-visible">
      <!-- Status Banner -->
      <div class="status-banner anim-in delay-1" id="statusBanner">
        <div class="status-icon-wrap">📡</div>
        <div class="status-title">网络正常</div>
        <div class="status-sub">所有规则待命</div>
        <div class="status-timer">
          <span>⏱</span>
          <span>下次断网：<strong>1小时42分钟后</strong></span>
        </div>
      </div>

      <!-- Section Header -->
      <div class="section-header anim-in delay-3">
        <span class="section-title">断网规则</span>
        <span class="section-count">3 条规则 · 2 条生效</span>
      </div>

      <!-- Rule Cards -->
      <div class="rule-card anim-in delay-4" id="rule1">
        <div class="rule-top">
          <span class="rule-name">🌙 晚间静修</span>
          <div class="rule-toggle on" data-rule="1"><div class="rule-toggle-knob"></div></div>
        </div>
        <div class="rule-meta">
          <span class="rule-time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            22:00 → 07:00
          </span>
          <span class="rule-badge">跨天</span>
        </div>
        <div class="rule-tags">
          <span class="rule-tag wifi">WiFi</span>
          <span class="rule-tag mobile">移动网络</span>
          <span class="rule-tag strict">严格</span>
        </div>
      </div>

      <div class="rule-card active anim-in delay-5" id="rule2">
        <div class="rule-top">
          <span class="rule-name">🎯 工作专注</span>
          <div class="rule-toggle on" data-rule="2"><div class="rule-toggle-knob"></div></div>
        </div>
        <div class="rule-meta">
          <span class="rule-time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            09:00 → 12:00
          </span>
          <span class="rule-badge" style="background:rgba(78,205,196,0.12);color:#4ecdc4;border-color:rgba(78,205,196,0.15)">进行中</span>
        </div>
        <div class="rule-tags">
          <span class="rule-tag wifi">WiFi</span>
          <span class="rule-tag mobile">移动网络</span>
        </div>
      </div>

      <div class="rule-card anim-in delay-6" id="rule3">
        <div class="rule-top">
          <span class="rule-name">📚 阅读时间</span>
          <div class="rule-toggle" data-rule="3"><div class="rule-toggle-knob"></div></div>
        </div>
        <div class="rule-meta">
          <span class="rule-time">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            20:00 → 21:00
          </span>
        </div>
        <div class="rule-tags">
          <span class="rule-tag wifi">WiFi</span>
        </div>
      </div>

      <!-- FAB -->
      <button class="fab" onclick="switchScreen('add')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <!-- ═══ SCREEN 2: ADD SCHEDULE ═══ -->
    <div id="screen-add" class="screen screen-hidden">
      <div class="nav-bar anim-in delay-1">
        <button class="nav-back" onclick="switchScreen('home')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          返回
        </button>
        <span class="nav-title">添加规则</span>
      </div>

      <div style="padding-top:8px">
        <!-- 规则名称 -->
        <div class="form-group anim-in delay-2">
          <label class="form-label">规则名称</label>
          <input class="form-input" type="text" placeholder="如：晚间静修、工作专注" value="晚间静修">
        </div>

        <!-- 时间段 -->
        <div class="form-group anim-in delay-3">
          <label class="form-label">时间段</label>
          <div class="time-pickers">
            <div class="time-picker">
              <div class="time-picker-label">开始</div>
              <div class="time-picker-value">22:00</div>
              <div class="time-picker-desc">今晚</div>
            </div>
            <div class="time-arrow">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
            <div class="time-picker">
              <div class="time-picker-label">结束</div>
              <div class="time-picker-value">07:00</div>
              <div class="time-picker-desc">次日</div>
            </div>
          </div>
        </div>

        <!-- 重复 -->
        <div class="form-group anim-in delay-4">
          <label class="form-label">重复</label>
          <div class="week-chips">
            <div class="week-chip active">一</div>
            <div class="week-chip active">二</div>
            <div class="week-chip active">三</div>
            <div class="week-chip active">四</div>
            <div class="week-chip active">五</div>
            <div class="week-chip">六</div>
            <div class="week-chip">日</div>
          </div>
          <div style="margin-top:8px;display:flex;gap:6px">
            <button class="btn-secondary">每天</button>
            <button class="btn-secondary" style="background:rgba(78,205,196,0.08);border-color:rgba(78,205,196,0.15);color:#4ecdc4">工作日</button>
            <button class="btn-secondary">周末</button>
          </div>
        </div>

        <!-- 封锁网络类型 -->
        <div class="form-group anim-in delay-5">
          <label class="form-label">封锁网络</label>
          <div class="network-option" onclick="toggleSwitch(this)">
            <div class="network-option-left">
              <div class="network-option-icon wifi">📶</div>
              <div>
                <div class="network-option-title">WiFi</div>
                <div class="network-option-desc">关闭无线网络连接</div>
              </div>
            </div>
            <div class="switch on"><div class="switch-knob"></div></div>
          </div>
          <div class="network-option" onclick="toggleSwitch(this)">
            <div class="network-option-left">
              <div class="network-option-icon mobile">📱</div>
              <div>
                <div class="network-option-title">移动网络</div>
                <div class="network-option-desc">关闭蜂窝数据连接</div>
              </div>
            </div>
            <div class="switch on"><div class="switch-knob"></div></div>
          </div>
        </div>

        <!-- 严格模式 -->
        <div class="form-group anim-in delay-6">
          <div class="strict-row">
            <div class="strict-left">
              <div class="strict-title">🔒 严格模式</div>
              <div class="strict-desc">断网期间禁止手动恢复</div>
            </div>
            <div class="switch on" onclick="toggleSwitch(this)"><div class="switch-knob"></div></div>
          </div>
        </div>

        <!-- 提交 -->
        <div class="anim-in delay-7">
          <button class="btn-primary" onclick="switchScreen('home')">创建规则</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Screen Switching ────────────────────────────
function switchScreen(target) {
  const home = document.getElementById('screen-home');
  const add = document.getElementById('screen-add');
  if (target === 'add') {
    home.classList.remove('screen-visible');
    home.classList.add('screen-hidden');
    add.classList.remove('screen-hidden');
    add.classList.add('screen-visible');
    // Reset animations on add screen
    add.querySelectorAll('.anim-in').forEach((el, i) => {
      el.style.animation = 'none';
      el.offsetHeight; // trigger reflow
      el.style.animation = '';
    });
  } else {
    // If switching back to home, toggle status banner
    add.classList.remove('screen-visible');
    add.classList.add('screen-hidden');
    home.classList.remove('screen-hidden');
    home.classList.add('screen-visible');
    // Reset animations
    home.querySelectorAll('.anim-in').forEach((el, i) => {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });
  }
}

// ─── Toggle Switch ───────────────────────────────
function toggleSwitch(el) {
  const sw = el.classList.contains('switch') ? el : el.querySelector('.switch');
  if (!sw) return;
  sw.classList.toggle('on');
}

// ─── Rule toggle ─────────────────────────────────
document.querySelectorAll('.rule-toggle').forEach(toggle => {
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    toggle.classList.toggle('on');
  });
});

// ─── Week chip toggle ────────────────────────────
document.querySelectorAll('.week-chip').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('active'));
});

// ─── Quick select buttons ────────────────────────
document.querySelectorAll('.btn-secondary').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.textContent.trim() === '每天') {
      document.querySelectorAll('.week-chip').forEach(c => c.classList.add('active'));
    } else if (btn.textContent.trim() === '工作日') {
      document.querySelectorAll('.week-chip').forEach((c, i) => {
        c.classList.toggle('active', i < 5);
      });
    } else if (btn.textContent.trim() === '周末') {
      document.querySelectorAll('.week-chip').forEach((c, i) => {
        c.classList.toggle('active', i >= 5);
      });
    }
  });
});

// ─── Simulate blocked state toggle (status banner) ──
const banner = document.getElementById('statusBanner');
const ruleCards = document.querySelectorAll('.rule-card');
const toggleRuleActive = () => {
  // Toggle the second rule's active state as a demo
  const rule2 = document.getElementById('rule2');
  rule2.classList.toggle('active');
  
  // Update banner
  const isBlocked = rule2.classList.contains('active');
  banner.classList.toggle('blocked', isBlocked);
  const icon = banner.querySelector('.status-icon-wrap');
  icon.textContent = isBlocked ? '🚫' : '📡';
  const title = banner.querySelector('.status-title');
  title.textContent = isBlocked ? '网络已封锁' : '网络正常';
  const sub = banner.querySelector('.status-sub');
  sub.textContent = isBlocked ? '「工作专注」进行中' : '所有规则待命';
  const timer = banner.querySelector('.status-timer strong');
  timer.textContent = isBlocked ? '2小时18分钟后恢复' : '1小时42分钟后';
  
  // Update the badge on rule2
  const badge = rule2.querySelector('.rule-badge');
  if (badge) {
    badge.textContent = isBlocked ? '进行中' : '待命中';
    badge.style.color = isBlocked ? '#4ecdc4' : '#ff9a6b';
    badge.style.background = isBlocked ? 'rgba(78,205,196,0.12)' : 'rgba(255,107,53,0.12)';
    badge.style.borderColor = isBlocked ? 'rgba(78,205,196,0.15)' : 'rgba(255,107,53,0.15)';
  }
};

// Click the second rule card to toggle
document.getElementById('rule2').addEventListener('click', toggleRuleActive);

// ─── Simulate: toggle WiFi/mobile on rule3 ──────
// Not needed, auto via CSS
</script>
</body>
</html>
